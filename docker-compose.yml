services:
  mongodb:
    image: mongo:7
    container_name: tasks-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: tasks_management
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tasks-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      MONGODB_URL: "mongodb://mongodb:27017"
      MONGODB_DATABASE_NAME: "tasks_management"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-in-production-please-change-me}"
      DEMO_USERNAME: "${DEMO_USERNAME:-admin}"
      DEMO_PASSWORD: "${DEMO_PASSWORD:-admin}"
      DEBUG: "${DEBUG:-false}"
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: tasks-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
